<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Xenolinguist's Dilemma — DEER Prototype v1.7</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0ede8;--bg-panel:#ffffff;--bg-inset:#e8e5e0;
  --p1:#1a5fa8;--p1lt:#deeaf8;--p1bd:#8ab8e0;
  --p2:#6622aa;--p2lt:#ede0f8;--p2bd:#bb99e0;
  --ok:#147a50;--oklt:#d6f0e4;--okbd:#7acba8;
  --err:#b81c1c;--errlt:#fde8e8;--errbd:#e8a0a0;
  --seed:#0a5a3a;--seedlt:#c8eedd;--seedbd:#5abf90;
  --warn:#8a5000;--warnlt:#fef3dc;--warnbd:#e0c070;
  --tx:#18181e;--mu:#484858;--dim:#888898;
  --bd:#ccc9c3;--bd2:#b0ada8;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--sans);font-size:16px;line-height:1.45;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* HEADER */
.app-header{background:#18182e;padding:6px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-family:var(--mono);font-size:16px;font-weight:600;color:#e0f0ff;}
.logo span{color:#607090;font-size:13px;font-weight:400;margin-left:6px;}
.sig{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:13px;color:#607090;font-family:var(--mono);}
.sig-dot{width:6px;height:6px;border-radius:50%;background:#5bf5a8;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* TABS */
.view-tabs{display:flex;background:#fff;border-bottom:2px solid var(--bd);flex-shrink:0;}
.tab-btn{flex:1;padding:7px 8px;background:transparent;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;color:var(--dim);font-family:var(--sans);font-size:22px;font-weight:600;cursor:pointer;transition:all .15s;}
.tab-btn:hover{color:var(--mu);background:var(--bg-inset);}
.tab-s{color:var(--ok);border-bottom-color:var(--ok);background:#fff;}
.tab-1{color:var(--p1);border-bottom-color:var(--p1);background:#fff;}
.tab-2{color:var(--p2);border-bottom-color:var(--p2);background:#fff;}

/* TWO-COLUMN PLAYER PANEL — fills remaining height */
.view-panel{display:none;flex:1;overflow:hidden;min-height:0;}
.view-panel.active{display:grid;grid-template-columns:40% 60%;height:calc(100vh - 62px);}
.view-panel.active.phase-intro{grid-template-columns:1fr;}
.view-panel.active.phase-intro .col-shared{display:none;}
.view-panel.active.phase-intro .col-private{grid-column:1;background:#0c0e1a;}
.col-shared{overflow-y:auto;border-right:2px solid var(--bd2);background:var(--bg);}
.col-shared::-webkit-scrollbar,.col-private::-webkit-scrollbar{width:4px;}
.col-shared::-webkit-scrollbar-thumb,.col-private::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px;}
.col-private{overflow-y:auto;background:#fff;}
.col-hdr{padding:6px 12px;display:flex;align-items:center;gap:7px;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--bd);}
.col-hdr-shared{background:var(--bg-inset);}
.col-hdr-private{background:#fff;}

/* BADGE */
.badge{font-size:12px;font-weight:600;letter-spacing:.07em;padding:2px 6px;border-radius:3px;text-transform:uppercase;font-family:var(--mono);}
.b-s{background:var(--oklt);color:var(--ok);border:1px solid var(--okbd);}
.b-1{background:var(--p1lt);color:var(--p1);border:1px solid var(--p1bd);}
.b-2{background:var(--p2lt);color:var(--p2);border:1px solid var(--p2bd);}
.b-sec{background:var(--warnlt);color:var(--warn);border:1px solid var(--warnbd);}
.phdr-t{font-size:17px;color:var(--mu);}

/* SECTIONS */
.sec{padding:9px 12px;border-bottom:1px solid var(--bd);}
.sec-lbl{font-size:12px;font-weight:600;letter-spacing:.13em;text-transform:uppercase;color:var(--dim);margin-bottom:7px;display:flex;align-items:center;gap:6px;font-family:var(--mono);}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bd);}

/* BANNERS */
.banner{border-radius:5px;padding:8px 12px;}
.bn-p1{background:var(--p1lt);border:1px solid var(--p1bd);border-left:3px solid var(--p1);}
.bn-p2{background:var(--p2lt);border:1px solid var(--p2bd);border-left:3px solid var(--p2);}
.bn-warn{background:var(--warnlt);border:1px solid var(--warnbd);border-left:3px solid var(--warn);}
.bn-title{font-size:16px;font-weight:600;margin-bottom:2px;}
.bn-p1 .bn-title{color:var(--p1);}
.bn-p2 .bn-title{color:var(--p2);}
.bn-warn .bn-title{color:var(--warn);}
.bn-desc{font-size:22px;color:var(--mu);line-height:1.5;}

.xenox-msg{background:#18182e;border-radius:5px;padding:10px 12px;font-size:22px;color:#c0d8f0;font-style:italic;line-height:1.65;}
.xenox-sender{font-family:var(--mono);font-size:12px;color:#5a80a0;letter-spacing:.13em;text-transform:uppercase;margin-bottom:5px;font-style:normal;}

/* BUTTONS */
.btn{display:block;width:100%;margin-top:5px;padding:6px 10px;border-radius:4px;background:#fff;border:1px solid var(--bd2);color:var(--mu);font-family:var(--sans);font-size:22px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;}
.btn:hover:not(:disabled){border-color:var(--p1);color:var(--p1);background:var(--p1lt);}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.btn-p1{border-color:var(--p1);color:var(--p1);}
.btn-p1:hover:not(:disabled){background:var(--p1lt);}
.btn-p2{border-color:var(--p2);color:var(--p2);}
.btn-p2:hover:not(:disabled){background:var(--p2lt);}
.btn-ok{border-color:var(--ok);color:var(--ok);}
.btn-ok:hover:not(:disabled){background:var(--oklt);}
.btn-err{border-color:var(--err);color:var(--err);}
.btn-err:hover:not(:disabled){background:var(--errlt);}
.btn-sm{padding:4px 9px;font-size:17px;margin-top:4px;}
.btn-row{display:flex;gap:5px;margin-top:5px;}
.btn-row .btn{margin-top:0;}

/* STATUS */
.st{font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 7px;border-radius:3px;text-transform:uppercase;}
.st-pending{background:var(--bg-inset);color:var(--dim);border:1px solid var(--bd2);}
.st-verified{background:var(--oklt);color:var(--ok);border:1px solid var(--okbd);}
.st-hallucination{background:var(--errlt);color:var(--err);border:1px solid var(--errbd);}

/* TX CARD */
.tx-card{background:#fff;border:1px solid var(--bd);border-radius:5px;padding:7px 10px;margin-bottom:5px;cursor:pointer;transition:all .15s;}
.tx-card.active{border-color:var(--p1);border-width:2px;}
.tx-card:hover:not(.active){background:var(--bg-inset);}
.tx-card-hdr{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.09em;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.tx-seq{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin-bottom:3px;}
.tx-sym{font-family:var(--mono);font-size:20px;color:var(--tx);}
.tx-sym.seed{color:var(--seed);background:var(--seedlt);border:1px solid var(--seedbd);border-radius:3px;padding:1px 5px;}
.tx-arrow{font-size:17px;color:var(--dim);}
.tx-english{font-size:17px;color:var(--mu);font-style:italic;margin-top:2px;}

/* VERDICT LOG */
.vlog-entry{background:#fff;border:1px solid var(--bd);border-radius:4px;padding:6px 9px;margin-bottom:5px;}
.vlog-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.vlog-tx{font-family:var(--mono);font-size:12px;color:var(--dim);flex-shrink:0;}
.vlog-seq{font-family:var(--mono);font-size:16px;letter-spacing:2px;flex:1;}
.vlog-empty{font-size:17px;color:var(--dim);font-style:italic;}

/* LATTICE */
.lattice-outer{background:#fff;border:2px solid var(--p1);border-radius:8px;padding:14px;overflow-x:auto;}
.lattice-outer.lat-p2{border-color:var(--p2);}
.lattice-grid{display:flex;gap:8px;min-width:max-content;}
.lattice-col{display:flex;flex-direction:column;gap:6px;align-items:center;}
.lattice-col-label{font-family:var(--mono);font-size:12px;color:var(--dim);margin-bottom:1px;text-align:center;}
.lattice-cell{width:40px;height:40px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:20px;border:2px solid var(--bd);background:var(--bg-inset);color:var(--tx);cursor:pointer;transition:all .12s;user-select:none;}
.lattice-cell:hover{border-color:var(--p2);background:var(--p2lt);color:var(--p2);}
.lattice-cell.selected{border-color:var(--p2);background:var(--p2);color:#fff;box-shadow:0 0 0 2px var(--p2lt);}

/* PATH PREVIEW */
.path-preview{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin:5px 0;}
.path-cell{width:32px;height:32px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:22px;border:2px solid var(--p2bd);background:var(--p2lt);color:var(--p2);}
.path-empty{width:32px;height:32px;border-radius:4px;border:2px dashed var(--bd2);background:var(--bg-inset);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:16px;}
.path-arrow{font-size:17px;color:var(--dim);}

/* PROBABILITY TABLE */
.prob-table{background:#fff;border:1px solid var(--p2);border-radius:5px;overflow:hidden;}
.prob-table-header{background:var(--p2lt);border-bottom:1px solid var(--p2bd);padding:5px 10px;display:grid;grid-template-columns:22px 1fr 1fr;gap:5px;font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--p2);}
.prob-row{display:grid;grid-template-columns:22px 1fr 1fr;gap:5px;align-items:center;padding:6px 10px;border-bottom:1px solid var(--bd);}
.prob-row:last-child{border-bottom:none;}
.prob-row:hover{background:var(--bg-inset);}
.prob-row-num{font-family:var(--mono);font-size:13px;color:var(--dim);font-weight:600;}
.prob-row-label{font-size:17px;color:var(--mu);}
.prob-row-score{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--p2);text-align:right;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal-box{background:#fff;border-radius:8px;padding:20px;max-width:560px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.3);}
.modal-title{font-size:17px;font-weight:600;margin-bottom:10px;}
.modal-close{float:right;background:none;border:none;font-size:20px;cursor:pointer;color:var(--dim);margin-top:-2px;}
.log-entry{background:var(--bg-inset);border-radius:4px;padding:7px 10px;margin-bottom:5px;border:1px solid var(--bd);}
.log-e-hdr{font-family:var(--mono);font-size:12px;color:var(--dim);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
.log-e-seq{font-family:var(--mono);font-size:22px;letter-spacing:3px;}
.log-e-prob{font-family:var(--mono);font-size:13px;color:var(--p2);margin-top:2px;}
.confirm-title{font-size:22px;font-weight:600;color:var(--mu);margin-bottom:8px;text-align:center;}
.confirm-msg{font-size:22px;color:var(--mu);line-height:1.6;margin-bottom:14px;}
.confirm-btns{display:flex;gap:8px;justify-content:center;}
.confirm-btns .btn{width:auto;margin-top:0;padding:7px 18px;}

/* INTRO */
.intro-screen{background:#0c0e1a;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;grid-column:1/-1;}
.intro-signal{font-family:var(--mono);font-size:13px;color:#4a7090;letter-spacing:.2em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:7px;}
.intro-signal-dot{width:7px;height:7px;border-radius:50%;background:#5bf5a8;animation:pulse 2s ease-in-out infinite;flex-shrink:0;}
.intro-card{background:#111428;border:1px solid #2a3858;border-radius:8px;padding:22px 26px;max-width:560px;width:100%;}
.intro-header{font-family:var(--mono);font-size:13px;color:#4a7090;letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.intro-header::after{content:'';flex:1;height:1px;background:#1e2840;}
.intro-title{font-family:var(--mono);font-size:20px;font-weight:600;color:#e0f0ff;margin-bottom:4px;}
.intro-divider{height:1px;background:#1e2840;margin:12px 0;}
.intro-begin{display:block;width:100%;padding:10px;background:transparent;border:2px solid #3a6090;border-radius:5px;font-family:var(--mono);font-size:22px;font-weight:600;color:#7ab0f0;cursor:pointer;text-align:center;letter-spacing:.06em;transition:all .2s;}
.intro-begin:hover{background:#0a1828;border-color:#5a90c0;color:#a0d0ff;}

.ag-text{font-family:var(--mono);font-size:22px;font-weight:600;color:var(--ok);letter-spacing:.16em;text-transform:uppercase;text-align:center;margin-top:10px;}
.text-dim{color:var(--dim);font-size:17px;}
.divider{height:1px;background:var(--bd);margin:8px 0;}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="logo">The Xenolinguist's Dilemma <span>DEER Prototype — Pilot v1.7</span></div>
    <button onclick="showSearleNotes()" style="margin-left:auto;background:transparent;border:1px solid #3a5070;border-radius:4px;color:#8090a8;font-family:var(--mono);font-size:11px;padding:5px 12px;cursor:pointer;letter-spacing:.06em;transition:all .2s;" onmouseover="this.style.borderColor='#7ab0f0';this.style.color='#c0d8f0'" onmouseout="this.style.borderColor='#3a5070';this.style.color='#8090a8'">📋 Dr. Searle's Notes</button>
    <div class="sig"><div class="sig-dot"></div>XENOX-7 SIGNAL ACTIVE</div>
  </div>
  <div class="view-tabs">
    <button class="tab-btn tab-1" id="tab-p1" onclick="switchView('p1')">Player 1</button>
    <button class="tab-btn" id="tab-p2" onclick="switchView('p2')">Player 2</button>
  </div>
  <div class="view-panel active" id="view-p1">
    <div class="col-shared" id="p1-shared"></div>
    <div class="col-private" id="p1-content"></div>
  </div>
  <div class="view-panel" id="view-p2">
    <div class="col-shared" id="p2-shared"></div>
    <div class="col-private" id="p2-content"></div>
  </div>
</div>
<div id="modal-root"></div>

<script>
/* ═══════════════════════════════════════════
   SYMBOLS
   I.* = input transmission glyphs (questions)
   G.* = output lattice glyphs (answers)
═══════════════════════════════════════════ */
const I={a:'▲',b:'▼',c:'◆',d:'●',e:'■',f:'▶',g:'◀',h:'★',i:'♦',j:'♠'};
const G={A:'◈',B:'⟁',C:'✦',D:'⧖',E:'◉',F:'⟴',H:'⧉',J:'⬡',K:'◐',L:'✺',M:'⟐',N:'⧫',O:'✵',P:'◑',Q:'⟇',R:'⌘',U:'⍟',V:'⎊'};

/*
  TX1: verified  = A→K→J→O→L  "All living things need water to survive"   (greedy path)
       hallucination = any other path
  TX2: hallucination = B→F→H→N→M  "Humans send messages by shouting into the ground"  (greedy path)
       verified  = B→F→H→U→V  "Humans send messages using electronic signals"  (non-greedy — U,V have lower bigram scores than N,M)
  Only these exact sequences receive their respective verdicts. Everything else = hallucination.
*/

/* ═══════════════════════════════════════════
   TRANSMISSIONS
═══════════════════════════════════════════ */
const TRANSMISSIONS=[
  {
    inputSeq:[I.a,I.b,I.c,I.d,I.e],
    inputQuestion:'What do all life forms require?',
    seed:G.A,
    verifiedSeq:[G.A,G.K,G.J,G.O,G.L],   // "All living things need water to survive" — greedy path
    greedyIsVerified:true,
    sentences:{
      verified:'All living things need water to survive',
      hallucination:'(hallucination)',
    }
  },
  {
    inputSeq:[I.f,I.g,I.h,I.i,I.j],
    inputQuestion:'How do humans transmit information?',
    seed:G.B,
    verifiedSeq:[G.B,G.F,G.H,G.U,G.V],   // "Humans send messages using electronic signals" — non-greedy path
    greedyIsVerified:false,
    sentences:{
      verified:'Humans send messages using electronic signals',
      hallucination:'Humans send messages by shouting into the ground',
    }
  }
];

/* ═══════════════════════════════════════════
   CODEX CARDS
   TX1 codex → Player 1 holds (both input + output)
   TX2 codex → Player 2 holds (both input + output)
═══════════════════════════════════════════ */
const INPUT_CODEX={
  [I.a]:'What',[I.b]:'do',[I.c]:'all',[I.d]:'life',[I.e]:'forms require?',
  [I.f]:'How',[I.g]:'do',[I.h]:'humans',[I.i]:'transmit',[I.j]:'information?',
};
const OUTPUT_CODEX={
  [G.A]:'All',           [G.B]:'Humans',
  [G.K]:'living things', [G.F]:'send',
  [G.J]:'need',          [G.H]:'messages',
  [G.O]:'water',         [G.N]:'by shouting',
  [G.L]:'to survive',    [G.M]:'into the ground',
  [G.E]:'sometimes',     [G.P]:'oxygen',
  [G.Q]:'always',        [G.D]:'darkness',
  [G.C]:'require',       [G.U]:'using',
  [G.V]:'electronic signals',
};

// TX1 symbols (input + output) — Player 1 holds
const TX1_INPUT_GLYPHS=[I.a,I.b,I.c,I.d,I.e];
const TX1_OUTPUT_GLYPHS=[G.A,G.K,G.J,G.O,G.L,G.H,G.F,G.M,G.N,G.E,G.P,G.D];

// TX2 symbols (input + output) — Player 2 holds
const TX2_INPUT_GLYPHS=[I.f,I.g,I.h,I.i,I.j];
const TX2_OUTPUT_GLYPHS=[G.B,G.F,G.H,G.N,G.M,G.U,G.V,G.K,G.J,G.O,G.L,G.Q];

/* ═══════════════════════════════════════════
   BIGRAMS
═══════════════════════════════════════════ */
const BIGRAMS={
  [G.A]:{[G.K]:82,[G.F]:54,[G.H]:38,[G.J]:21,[G.P]:12},
  [G.K]:{[G.J]:75,[G.M]:48,[G.L]:33,[G.N]:19,[G.O]:10},
  [G.J]:{[G.O]:88,[G.H]:57,[G.P]:31,[G.F]:22,[G.L]:14},
  [G.O]:{[G.L]:71,[G.K]:44,[G.M]:29,[G.Q]:16,[G.N]:8},
  [G.B]:{[G.F]:79,[G.K]:51,[G.E]:35,[G.M]:20,[G.J]:11},
  [G.F]:{[G.H]:83,[G.J]:59,[G.O]:36,[G.N]:23,[G.L]:14},
  // After H: N is greedy (77), U is non-greedy (38) — players must explore to find U→V path
  [G.H]:{[G.N]:77,[G.L]:52,[G.U]:38,[G.P]:18,[G.Q]:9},
  // After N: M is greedy (85), others are low
  [G.N]:{[G.M]:85,[G.O]:47,[G.J]:28,[G.Q]:15,[G.E]:7},
  // After U: V is highest — once players find U, V is the natural next step
  [G.U]:{[G.V]:81,[G.O]:44,[G.J]:27,[G.Q]:12,[G.L]:8},
};
function getBigram(a,b){
  if(BIGRAMS[a]&&BIGRAMS[a][b]!==undefined)return BIGRAMS[a][b];
  return(a.charCodeAt(0)*7+b.charCodeAt(0)*13)%35+5;
}

/*
  LATTICES — 5 columns × 5 rows each
  TX1 greedy: A(row2), K(row3), J(row1), O(row4), L(row0) — scattered, no top-row shortcut
  TX2:
    Greedy path:  B(row1)→F(row4)→H(row2)→N(row0)→M(row3)
    Verified path: B(row1)→F(row4)→H(row2)→U(row1)→V(row0)
    U and V appear in col3 and col4 alongside other options
*/
const LATTICES=[
  // TX1 — seed G.A at col0 row2
  [[G.H,G.P,G.A,G.Q,G.E],[G.F,G.M,G.L,G.K,G.N],[G.O,G.J,G.H,G.P,G.E],[G.K,G.M,G.Q,G.N,G.O],[G.L,G.K,G.M,G.P,G.N]],
  // TX2 — seed G.B at col0 row1
  // col3 has N(row0), U(row1), O(row2), J(row3), Q(row4)  — N is greedy, U is the verified alternative
  // col4 has V(row0), J(row1), Q(row2), M(row3), L(row4)  — M is greedy(after N), V is verified(after U)
  [[G.A,G.B,G.K,G.E,G.Q],[G.K,G.J,G.M,G.N,G.F],[G.J,G.O,G.H,G.P,G.L],[G.N,G.U,G.O,G.J,G.Q],[G.V,G.J,G.Q,G.M,G.L]],
];

/* ═══════════════════════════════════════════
   VERDICT — exact match only
   Only the verifiedSeq for each transmission produces "verified".
   Every other path is "hallucination", regardless of score.
═══════════════════════════════════════════ */
function computeVerdict(txIdx,seq){
  const vs=TRANSMISSIONS[txIdx].verifiedSeq;
  if(seq.length===vs.length&&seq.every((g,i)=>g===vs[i]))return'verified';
  return'hallucination';
}
function getPathProbs(seq){
  const p=[];
  for(let i=0;i<seq.length-1;i++)p.push(seq[i]&&seq[i+1]?getBigram(seq[i],seq[i+1]):null);
  return p;
}
function pathScore(seq){return getPathProbs(seq).reduce((a,b)=>a+(b||0),0);}
function inputSeqToEnglish(tx){return tx.inputSeq.map(s=>INPUT_CODEX[s]||s).join(' ');}
function outputSeqToEnglish(seq){return seq.map(g=>OUTPUT_CODEX[g]||g).join(' ');}
function stHtml(v){
  const cls=v==='verified'?'st-verified':v==='hallucination'?'st-hallucination':'st-pending';
  const lbl=v==='verified'?'Verified Truth':v==='hallucination'?'Hallucination':'Pending Response';
  return`<span class="st ${cls}">${lbl}</span>`;
}

function isComplete1(txIdx){return S.p1sel[txIdx].every(g=>g!==null);}
function isComplete2(txIdx){return S.p2sel[txIdx].every(g=>g!==null);}
function lastLog1(txIdx){const e=S.p1logs[txIdx];return e.length>0?e[e.length-1]:null;}
function lastLog2(txIdx){const e=S.p2logs[txIdx];return e.length>0?e[e.length-1]:null;}

function seqKey(seq){return seq.join(',');}
function logSequence1(txIdx){
  if(!isComplete1(txIdx))return;
  const seq=[...S.p1sel[txIdx]];
  const verdict=computeVerdict(txIdx,seq);
  const probs=getPathProbs(seq);
  const key=seqKey(seq);
  const logs=S.p1logs[txIdx];
  const existing=logs.findIndex(e=>seqKey(e.seq)===key);
  if(existing>=0){
    const entry=logs.splice(existing,1)[0];
    entry.count=(entry.count||1)+1;
    logs.push(entry);
  } else {
    logs.push({seq,verdict,probs,n:logs.length+1,count:1});
  }
  S.lastLogged={who:'p1',txIdx,time:Date.now()};
  setTimeout(()=>{if(S.lastLogged&&Date.now()-S.lastLogged.time>=1900)S.lastLogged=null;renderAll();},2000);
  renderAll();
}
function logSequence2(txIdx){
  if(!isComplete2(txIdx))return;
  const seq=[...S.p2sel[txIdx]];
  const verdict=computeVerdict(txIdx,seq);
  const probs=getPathProbs(seq);
  const key=seqKey(seq);
  const logs=S.p2logs[txIdx];
  const existing=logs.findIndex(e=>seqKey(e.seq)===key);
  if(existing>=0){
    const entry=logs.splice(existing,1)[0];
    entry.count=(entry.count||1)+1;
    logs.push(entry);
  } else {
    logs.push({seq,verdict,probs,n:logs.length+1,count:1});
  }
  S.lastLogged={who:'p2',txIdx,time:Date.now()};
  setTimeout(()=>{if(S.lastLogged&&Date.now()-S.lastLogged.time>=1900)S.lastLogged=null;renderAll();},2000);
  renderAll();
}

/* ═══════════════════════════════════════════
   COMBINED LATTICE + INLINE PROBABILITY HELPER
   Renders a lattice grid where probability scores
   between col N and col N+1 appear inline once
   a symbol is selected in col N.
   accentColor: CSS variable string for selected state
   onSelect: JS function call string like "selectCell2(0,col,row)"
═══════════════════════════════════════════ */
function renderLatticeWithProbs(lattice, sel, accentColor, accentLt, accentBd, selectFnName, txIdx, p1seq){
  const numCols=lattice.length;
  const numRows=lattice[0].length;
  const CELL=80; const GAP=8; const LABEL_H=22;
  let h=`<div style="overflow-x:auto;"><div style="display:flex;align-items:flex-start;gap:0;min-width:max-content;">`;
  for(let ci=0;ci<numCols;ci++){
    // Symbol column
    h+=`<div style="display:flex;flex-direction:column;gap:${GAP}px;align-items:center;">
      <div style="height:${LABEL_H}px;display:flex;align-items:center;font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.06em;text-align:center;">Col ${ci+1}</div>`;
    for(let ri=0;ri<numRows;ri++){
      const g=lattice[ci][ri];
      const isSelected=sel[ci]===g;
      const isP1Same=p1seq&&p1seq[ci]===g;
      h+=`<div onclick="${selectFnName}(${txIdx},${ci},${ri})"
        style="width:${CELL}px;height:${CELL}px;border-radius:6px;display:flex;align-items:center;justify-content:center;
          font-family:var(--mono);font-size:34px;cursor:pointer;user-select:none;transition:all .15s;
          border:2px solid ${isSelected?accentColor:isP1Same?'var(--warnbd)':'var(--bd)'};
          background:${isSelected?accentColor:isP1Same?'var(--warnlt)':'var(--bg-inset)'};
          color:${isSelected?'#fff':isP1Same?'var(--warn)':'var(--tx)'};">
        ${g}
      </div>`;
    }
    h+=`</div>`;
    // Probability strip between columns
    if(ci < numCols-1){
      const fromSym=sel[ci];
      const nextColSyms=lattice[ci+1];
      // Invisible label placeholder so rows align with symbol column
      h+=`<div style="display:flex;flex-direction:column;gap:${GAP}px;align-items:center;">
        <div style="height:${LABEL_H}px;"></div>`;
      for(let ri=0;ri<numRows;ri++){
        const toSym=nextColSyms[ri];
        const score=fromSym?getBigram(fromSym,toSym):null;
        const isSelNext=sel[ci+1]===toSym;
        h+=`<div style="width:52px;height:${CELL}px;display:flex;align-items:center;justify-content:center;">
          <div style="font-family:var(--mono);font-size:15px;font-weight:600;
            color:${score!==null?(isSelNext?accentColor:'var(--mu)'):'var(--bd2)'};
            text-align:center;line-height:1;">
            ${score!==null?score:'—'}
          </div>
        </div>`;
      }
      h+=`</div>`;
    }
  }
  h+=`</div></div>`;
  return h;
}

/* Renders a sequence with bigram probabilities shown between each adjacent token pair */
function seqWithProbs(seq, accentColor, p1seqRef){
  let h=`<div style="display:flex;align-items:flex-start;gap:0;flex-wrap:nowrap;overflow-x:auto;padding:8px 2px;">`;
  for(let i=0;i<seq.length;i++){
    const g=seq[i];
    const word=OUTPUT_CODEX[g]||g;
    const isChanged=p1seqRef&&p1seqRef.length&&p1seqRef[i]&&g!==p1seqRef[i];
    const isSame=p1seqRef&&p1seqRef.length&&p1seqRef[i]&&g===p1seqRef[i];
    if(i>0){
      const prob=getBigram(seq[i-1],g);
      h+=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;width:36px;flex-shrink:0;margin-top:12px;">
        <span style="font-family:var(--mono);font-size:11px;font-weight:600;color:${accentColor}">${prob}</span>
        <span style="font-size:14px;color:var(--bd2);">→</span>
      </div>`;
    }
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0;">
      <div style="width:46px;height:46px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:18px;
        border:2px solid ${isChanged?'var(--err)':isSame?'var(--ok)':accentColor};
        background:${isChanged?'var(--errlt)':isSame?'var(--oklt)':'var(--bg-inset)'};
        color:${isChanged?'var(--err)':isSame?'var(--ok)':accentColor};">${g}</div>
      <div style="font-size:10px;font-weight:600;color:${isChanged?'var(--err)':isSame?'var(--ok)':'var(--mu)'};text-align:center;max-width:60px;">${word}</div>
    </div>`;
  }
  h+=`</div>`;
  return h;
}

      const isActive=S.activeTx===i;
      h+=`<div class="tx-card${isActive?' active':''}" onclick="setActiveTx(${i})">
        <div class="tx-card-hdr"><span>XENOX-7 TRANSMISSION 0${i+1}</span></div>
        <div class="tx-seq">
          ${tx.inputSeq.map((sym,si)=>`<span class="tx-sym">${sym}</span>${si<tx.inputSeq.length-1?'<span class="tx-arrow">→</span>':''}`).join('')}
        </div>
        <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
          <span style="font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.08em;">RESPONSE SEED</span>
          <span class="tx-sym seed">${tx.seed}</span>
        </div>
      </div>`;
    });
    h+=`</div>`;
    h+=`<div class="sec"><div class="sec-lbl">Verdict Log</div>`;
    let any=false;
    for(let i=0;i<2;i++){
      const ll=lastLog1(i);
      if(ll){
        any=true;
        const score=pathScore(ll.seq);
        const v=ll.verdict;
        const vcls=v==='verified'?'var(--ok)':v==='hallucination'?'var(--err)':'var(--dim)';
        const vbg=v==='verified'?'var(--oklt)':v==='hallucination'?'var(--errlt)':'var(--bg-inset)';
        const vbd=v==='verified'?'var(--okbd)':v==='hallucination'?'var(--errbd)':'var(--bd2)';
        const vlbl=v==='verified'?'Verified Truth':v==='hallucination'?'Hallucination':'—';
        const justLogged=S.lastLogged&&S.lastLogged.txIdx===i&&Date.now()-S.lastLogged.time<2000;
        h+=`<div class="vlog-entry" style="border-left:3px solid ${vcls};${justLogged?'background:var(--oklt);border-color:var(--okbd);':''}transition:background .3s;">
          <div class="vlog-row" style="margin-bottom:4px;">
            <span class="vlog-tx">TX-0${i+1}</span>
            <span class="vlog-seq">${ll.seq.join(' ')}</span>
            <span style="font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 10px;border-radius:3px;background:${vbg};border:1px solid ${vbd};color:${vcls};">${vlbl}</span>
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--dim);">Path score: ${score}</div>
        </div>`;
      }
    }
    if(!any)h+=`<div class="vlog-entry"><div class="vlog-empty">No sequences logged yet.</div></div>`;
    h+=`</div>`;
    h+=`<div class="sec"><div class="sec-lbl">Final Transmission</div><button class="btn btn-ok" onclick="showConfirmTransmit()">Transmit final outputs →</button></div>`;

  } else {
    // PHASE 2
    h+=`<div class="sec">
      <div style="background:#110a08;border:1px solid #6a3010;border-radius:6px;padding:16px 20px;">
        <div style="font-family:var(--mono);font-size:10px;color:#8a5000;letter-spacing:.14em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;">
          <span>⚡ Intercepted Message — Secure Channel</span><span style="color:#f5a85b">● Unread</span>
        </div>
        <div style="font-family:var(--mono);font-size:12px;color:#b89070;margin-bottom:12px;">FROM: &nbsp;<span style="color:#f5c890">— a friend —</span></div>
        <div style="font-size:15px;color:#e0c8a0;line-height:1.8;border-top:1px solid #3a2010;padding-top:12px;font-style:italic;">
          "I caught your transmission before the XENOX-7 received it — you almost got caught sending hallucinations!! Maybe this will help, be more careful next time."
        </div>
      </div>
    </div>`;

    function symBreakdown(syms, codex, seedSym){
      return`<div style="display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;margin-top:8px;">
        ${syms.map((s,si)=>{
          const word=codex[s]||'?';
          const isSeed=seedSym&&s===seedSym&&si===0;
          return`<div style="display:flex;flex-direction:column;align-items:center;gap:4px;">
            <span class="${isSeed?'tx-sym seed':'tx-sym'}">${s}</span>
            <div style="font-size:11px;color:var(--mu);text-align:center;max-width:72px;line-height:1.3;">${word}</div>
          </div>${si<syms.length-1?'<div style="font-size:14px;color:var(--dim);align-self:center;padding:0 2px;margin-top:-10px;">→</div>':''}`;
        }).join('')}
      </div>`;
    }
    function verdictBadge(v){
      const vcls=v==='verified'?'var(--ok)':v==='hallucination'?'var(--err)':'var(--dim)';
      const vbg=v==='verified'?'var(--oklt)':v==='hallucination'?'var(--errlt)':'var(--bg-inset)';
      const vbd=v==='verified'?'var(--okbd)':v==='hallucination'?'var(--errbd)':'var(--bd2)';
      const vlbl=v==='verified'?'Verified Truth':v==='hallucination'?'Hallucination':'Pending';
      return`<span style="font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 10px;border-radius:3px;background:${vbg};border:1px solid ${vbd};color:${vcls};">${vlbl}</span>`;
    }

    for(let i=0;i<2;i++){
      const tx=TRANSMISSIONS[i];
      const ll1=lastLog1(i);
      const ll2=lastLog2(i);
      const v1=S.finalVerdicts[i];
      const isActive=S.p2activeTx===i;
      const v1cls=v1==='verified'?'var(--ok)':v1==='hallucination'?'var(--err)':'var(--bd2)';
      h+=`<div class="sec">
        <div class="sec-lbl">Transmission 0${i+1}</div>
        <div style="background:var(--bg-inset);border:1px solid var(--bd2);border-radius:6px;padding:14px 16px;margin-bottom:10px;cursor:pointer;" onclick="setP2ActiveTx(${i})">
          <div style="font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;">Input ${isActive?'● Active':''}</div>
          ${symBreakdown(tx.inputSeq, INPUT_CODEX, null)}
          <div style="margin-top:10px;display:flex;align-items:center;gap:8px;">
            <span style="font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.08em;">RESPONSE SEED</span>
            <span class="tx-sym seed">${tx.seed}</span>
          </div>
        </div>
        <div style="background:#fff;border:1px solid var(--bd);border-left:3px solid ${v1cls};border-radius:6px;padding:14px 16px;margin-bottom:10px;">
          <div style="font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;">
            <span>Phase 1 Output</span>${ll1?verdictBadge(v1):'<span style="font-family:var(--mono);font-size:11px;color:var(--dim);">—</span>'}
          </div>
          ${ll1?`${symBreakdown(ll1.seq,OUTPUT_CODEX,tx.seed)}<div style="margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--mu);">Path score: <strong style="color:var(--tx)">${pathScore(ll1.seq)}</strong></div>`:`<div style="font-size:13px;color:var(--dim);font-style:italic;margin-top:8px;">No output logged in Phase 1.</div>`}
        </div>
        <div style="background:#fff;border:1px solid var(--bd);border-left:3px solid ${ll2?ll2.verdict==='verified'?'var(--ok)':ll2.verdict==='hallucination'?'var(--err)':'var(--bd2)':'var(--bd)'};border-radius:6px;padding:14px 16px;">
          <div style="font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;">
            <span>Phase 2 Output (Revised)</span>${ll2?verdictBadge(ll2.verdict):'<span style="font-family:var(--mono);font-size:11px;color:var(--dim);">Pending</span>'}
          </div>
          ${ll2?`${symBreakdown(ll2.seq,OUTPUT_CODEX,tx.seed)}<div style="margin-top:10px;font-family:var(--mono);font-size:11px;color:var(--mu);">Path score: <strong style="color:var(--tx)">${pathScore(ll2.seq)}</strong></div>`:`<div style="font-size:13px;color:var(--dim);font-style:italic;margin-top:8px;">No revised output logged yet.</div>`}
        </div>
      </div>`;
    }
    h+=`<div class="sec"><div class="sec-lbl">Final Transmission</div><button class="btn btn-ok" onclick="showConfirmTransmit()">Transmit final outputs →</button></div>`;
    if(S.p2transmitted){
      h+=`<div class="sec"><div style="text-align:center;padding:8px 0"><button class="btn btn-err" style="margin-top:0" onclick="resetGame()">↺ Reset for next playthrough</button></div></div>`;
    }
  }
  return h;
}

/* ═══════════════════════════════════════════
   RENDER PLAYER 1

   Phase 1: P1 controls lattice (TX1 and TX2)
   Phase 2:
     TX1 → P1 is codex holder + sequence+word display
     TX2 → P1 is lattice controller
═══════════════════════════════════════════ */
function renderP1(){
  if(LOCKED_VIEW && LOCKED_VIEW !== 'p1') return;

  let h='';

  if(S.phase===1){
    const txIdx=S.activeTx;
    const lattice=LATTICES[txIdx];
    const sel=S.p1sel[txIdx];

    // TX tabs
    h+=`<div class="sec"><div class="btn-row">${[0,1].map(i=>`<button class="btn${i===txIdx?' btn-p1':''}" style="margin-top:0" onclick="setActiveTx(${i})">Transmission 0${i+1}</button>`).join('')}</div></div>`;

    // Path preview
    h+=`<div class="sec"><div class="sec-lbl">Current Path</div>
      <div class="path-preview">
        ${[0,1,2,3,4].map(col=>{const g=sel[col];return(col<4)?(g?`<div class="path-cell">${g}</div>`:`<div class="path-empty">·</div>`)+'<div class="path-arrow">→</div>':(g?`<div class="path-cell">${g}</div>`:`<div class="path-empty">·</div>`);}).join('')}
      </div></div>`;

    // Lattice
    h+=`<div class="sec"><div class="sec-lbl">Lattice</div>
      <div class="lattice-outer">
        <div class="lattice-grid">
          ${lattice.map((col,ci)=>`<div class="lattice-col"><div class="lattice-col-label">Col ${ci+1}</div>
            ${col.map((g,ri)=>`<div class="lattice-cell${sel[ci]===g?' selected':''}" onclick="selectCell1(${txIdx},${ci},${ri})">${g}</div>`).join('')}
          </div>`).join('')}
        </div>
      </div></div>`;

    h+=`<div class="sec"><div class="btn-row">
      <button class="btn btn-p1" onclick="logSequence1(${txIdx})" ${!isComplete1(txIdx)?'disabled':''}>Log output sequence</button>
      <button class="btn" onclick="showLogModal('p1')">View output sequences log</button>
    </div>
    <button class="btn btn-err btn-sm" onclick="clearSel1(${txIdx})">Clear path</button></div>`;

  } else {
    // PHASE 2
    const txIdx=S.p2activeTx;

    if(txIdx===0){
      // TX1 Phase 2: P1 sees three panels — input, initial output with probs, live translation
      // P2 controls the TX1 lattice; P1 reads translations as symbols appear

      h+=`<div class="sec">
        <div style="background:#110a08;border:1px solid #6a3010;border-radius:6px;padding:14px 18px;">
          <div style="font-family:var(--mono);font-size:10px;color:#8a5000;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;">⚡ Intercepted Message</div>
          <div style="font-size:14px;color:#e0c8a0;line-height:1.75;font-style:italic;">
            "Pay attention to the symbol translations."
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:#c09060;margin-top:8px;">— a friend</div>
        </div>
      </div>`;

      h+=`<div class="sec"><div class="btn-row">${[0,1].map(i=>`<button class="btn${i===txIdx?' btn-p1':''}" style="margin-top:0" onclick="setP2ActiveTx(${i})">Transmission 0${i+1}</button>`).join('')}</div></div>`;

      const tx=TRANSMISSIONS[0];

      // Panel 1: Input transmission + English translation
      h+=`<div class="sec"><div class="sec-lbl">1 — Input Transmission</div>
        <div style="background:var(--bg-inset);border:1px solid var(--bd2);border-radius:6px;padding:12px 16px;">
          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
            ${tx.inputSeq.map((s,si)=>`<span style="font-family:var(--mono);font-size:20px;">${s}</span>${si<tx.inputSeq.length-1?'<span style="color:var(--dim)">→</span>':''}`).join('')}
          </div>
          <div style="font-size:14px;color:var(--tx);font-weight:500;">"${inputSeqToEnglish(tx)}"</div>
        </div></div>`;

      // Panel 2: Initial output + English + probabilities
      const p1ll=lastLog1(0);
      const p1seq=p1ll?p1ll.seq:[];
      h+=`<div class="sec"><div class="sec-lbl">2 — Initial Output + Probabilities</div>
        <div style="background:#fff;border:1px solid var(--bd);border-left:3px solid var(--warn);border-radius:6px;padding:12px 16px;">
          ${p1seq.length
            ?seqWithProbs(p1seq,'var(--warn)',null)
            :`<div style="font-size:13px;color:var(--dim);font-style:italic;">No initial output logged.</div>`}
        </div></div>`;

      // Panel 3: Current path + live translation (driven by P2's selections on their lattice)
      const sel=S.p2sel[0];
      h+=`<div class="sec"><div class="sec-lbl">3 — Current Path + Live Translation</div>
        ${seqWithProbs(sel.map(g=>g||'·'), 'var(--p1)', p1seq)}
        ${p1seq.length?`<div style="display:flex;gap:14px;font-size:11px;margin-top:4px;padding:0 2px;">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--oklt);border:1px solid var(--okbd);display:inline-block;"></span>Same as initial</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--errlt);border:1px solid var(--errbd);display:inline-block;"></span>Changed</span>
        </div>`:''}
      </div>`;

      h+=`<div class="sec"><div class="btn-row">
        <button class="btn btn-p1" onclick="logSequence2(0)" ${!isComplete2(0)?'disabled':''}>Log output sequence</button>
        <button class="btn" onclick="showLogModal('p1')">View output sequences log</button>
      </div></div>`;

    } else {
      // TX2 Phase 2: P1 = lattice + inline probabilities only (P2 sees the three panels)

      h+=`<div class="sec">
        <div style="background:#110a08;border:1px solid #6a3010;border-radius:6px;padding:14px 18px;">
          <div style="font-family:var(--mono);font-size:10px;color:#8a5000;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;">⚡ Intercepted Message</div>
          <div style="font-size:14px;color:#e0c8a0;line-height:1.75;font-style:italic;">
            "The full probability landscape should help. Remember how LLMs work — the highest probability path does not necessarily produce verified truths..."
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:#c09060;margin-top:8px;">— a friend</div>
        </div>
      </div>`;

      h+=`<div class="sec"><div class="btn-row">${[0,1].map(i=>`<button class="btn${i===txIdx?' btn-p1':''}" style="margin-top:0" onclick="setP2ActiveTx(${i})">Transmission 0${i+1}</button>`).join('')}</div></div>`;

      const lattice=LATTICES[1];
      const sel=S.p2sel[1];
      const p1ll2=lastLog1(1);
      const p1seq2=p1ll2?p1ll2.seq:[];

      h+=`<div class="sec"><div class="sec-lbl">Lattice + Inline Probabilities</div>
        ${renderLatticeWithProbs(lattice,sel,'var(--p1)','var(--p1lt)','var(--p1bd)','selectCell2',1,p1seq2)}
      </div>`;

      h+=`<div class="sec"><div class="btn-row">
        <button class="btn btn-p1" onclick="logSequence2(1)" ${!isComplete2(1)?'disabled':''}>Log output sequence</button>
        <button class="btn" onclick="showLogModal('p1')">View output sequences log</button>
      </div>
      <button class="btn btn-err btn-sm" onclick="clearSel2(1)">Clear path</button></div>`;
    }
  }

  if(S.phase===0){
    document.getElementById('view-p1').classList.add('phase-intro');
    document.getElementById('p1-shared').innerHTML='';
    document.getElementById('p1-content').innerHTML=`<div class="intro-screen">
      <div class="intro-signal"><div class="intro-signal-dot"></div>SECURE TERMINAL — RESTRICTED ACCESS</div>
      <div class="intro-card">
        <div class="intro-header">Dr. J. Searle — Personal Workstation</div>
        <div class="intro-title">Welcome, Dr. Searle.</div>
        <div class="intro-divider"></div>
        <div style="background:#0a1828;border:1px solid #1e3050;border-radius:6px;padding:12px 16px;margin-bottom:18px;">
          <div style="font-family:var(--mono);font-size:9px;color:#4a7090;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">
            <span>New Message</span><span style="color:#5bf5a8">● Unread</span>
          </div>
          <div style="font-family:var(--mono);font-size:11px;color:#8090a8;margin-bottom:4px;">FROM: &nbsp;<span style="color:#c0d8f0">XENOX-7</span></div>
          <div style="font-family:var(--mono);font-size:11px;color:#8090a8;margin-bottom:12px;">SUBJ: &nbsp;<span style="color:#c0d8f0">Transmission received. Awaiting response.</span></div>
          <div style="font-family:var(--mono);font-size:19px;color:#c0d8f0;letter-spacing:8px;border-top:1px solid #1e3050;padding-top:12px;">▲ → ▼ → ◆ → ● → ■</div>
          <div style="font-family:var(--mono);font-size:19px;color:#c0d8f0;letter-spacing:8px;margin-top:7px;">▶ → ◀ → ★ → ♦ → ♠</div>
        </div>
        <button class="intro-begin" onclick="beginGame()">Access XENOX-7 Communication Terminal →</button>
      </div>
    </div>`;
    return;
  }
  document.getElementById('view-p1').classList.remove('phase-intro');

  // Log feedback banner
  const logBanner=(S.lastLogged&&S.lastLogged.who==='p1'&&Date.now()-S.lastLogged.time<2000)
    ?`<div style="background:var(--oklt);border-bottom:2px solid var(--okbd);padding:8px 12px;display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ok);font-size:13px;position:sticky;top:36px;z-index:9;">
        <span>✓</span> Sequence logged — TX-0${S.lastLogged.txIdx+1}
      </div>`:''

  const shared=sharedScreenHTML();
  document.getElementById('p1-shared').innerHTML=
    `<div class="col-hdr col-hdr-shared"><span class="badge b-s">Shared Terminal</span><span class="phdr-t">XENOX-7 Transmission Terminal</span></div>`+shared;
  document.getElementById('p1-content').innerHTML=
    `<div class="col-hdr col-hdr-private"><span class="badge b-1">Player 1</span><span class="badge b-sec">Secret</span><span class="phdr-t">${S.phase===1?'Lattice Map':S.p2activeTx===0?'Translations':'Lattice + Probs'}</span></div>`
    +logBanner+h;
}

/* ═══════════════════════════════════════════
   RENDER PLAYER 2

   Phase 1: P2 sees probability sequence (no lattice)
   Phase 2:
     TX1 → P2 is lattice controller
     TX2 → P2 is codex holder + sequence word display + input translation
═══════════════════════════════════════════ */
function renderP2(){
  if(LOCKED_VIEW && LOCKED_VIEW !== 'p2') return;

  let h='';

  if(S.phase===1){
    const txIdx=S.activeTx;
    const sel=S.p1sel[txIdx];
    const lattice=LATTICES[txIdx];

    h+=`<div class="sec"><div class="btn-row">${[0,1].map(i=>`<button class="btn${i===txIdx?' btn-p2':''}" style="margin-top:0" onclick="setActiveTx(${i})">Transmission 0${i+1}</button>`).join('')}</div></div>`;

    // Placed sequence — horizontal path display
    h+=`<div class="sec"><div class="sec-lbl">Placed Sequence</div>
      <div class="path-preview">`;
    for(let i=0;i<5;i++){
      const g=sel[i];
      if(i>0){
        const prev=sel[i-1];
        const score=(prev&&g)?getBigram(prev,g):null;
        h+=`<div class="path-arrow">→</div>
            <div style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--p2);min-width:20px;text-align:center;">${score!==null?score:'?'}</div>
            <div class="path-arrow">→</div>`;
      }
      h+=g?`<div class="path-cell" style="border-color:var(--p2bd);background:var(--p2lt);color:var(--p2)">${g}</div>`
          :`<div class="path-empty">·</div>`;
    }
    h+=`</div></div>`;

    // Next-column probability table
    // Find the last placed column to determine which column's options to show
    let lastPlacedCol=-1;
    for(let i=4;i>=0;i--){if(sel[i]!==null){lastPlacedCol=i;break;}}

    const currentSym=lastPlacedCol>=0?sel[lastPlacedCol]:null;
    const nextCol=lastPlacedCol+1;
    const nextColSymbols=nextCol<5?lattice[nextCol]:null; // 5 symbols in next column

    h+=`<div class="sec"><div class="sec-lbl">Given all prior tokens selected, probabilities for the next token are...</div>`;
    if(currentSym===null){
      h+=`<div style="color:var(--dim);font-size:13px;font-style:italic;padding:4px 0">—</div>`;
    } else if(!nextColSymbols){
      h+=`<div style="color:var(--dim);font-size:13px;font-style:italic;padding:4px 0">All columns placed.</div>`;
    } else {
      h+=`<div class="prob-table">
          <div class="prob-table-header"><span>Row</span><span></span><span style="text-align:right">Probability</span></div>
          ${nextColSymbols.map((sym,ri)=>{
            const score=getBigram(currentSym,sym);
            return`<div class="prob-row">
              <div class="prob-row-num">${ri+1}</div>
              <div class="prob-row-label"></div>
              <div class="prob-row-score">${score}</div>
            </div>`;
          }).join('')}
        </div>`;
    }
    h+=`</div>`;

    h+=`<div class="sec"><div class="btn-row">
      <button class="btn btn-p2" onclick="logSequence1(${txIdx})" ${!isComplete1(txIdx)?'disabled':''}>Log output sequence</button>
      <button class="btn" onclick="showLogModal('p2')">View output sequences log</button>
    </div></div>`;

  } else {
    // PHASE 2
    const txIdx=S.p2activeTx;

    if(txIdx===0){
      // TX1 Phase 2: P2 = lattice + inline probabilities (P1 sees live translation)

      h+=`<div class="sec">
        <div style="background:#110a08;border:1px solid #6a3010;border-radius:6px;padding:14px 18px;">
          <div style="font-family:var(--mono);font-size:10px;color:#8a5000;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;">⚡ Intercepted Message</div>
          <div style="font-size:14px;color:#e0c8a0;line-height:1.75;font-style:italic;">
            "The full probability landscape should help. Remember how LLMs work — the highest probability path does not necessarily produce verified truths..."
          </div>

      // Panel 3: Current path + live translation (driven by P1's selections on their lattice)
      const sel2=S.p2sel[1];
      h+=`<div class="sec"><div class="sec-lbl">3 — Current Path + Live Translation</div>
        ${seqWithProbs(sel2.map(g=>g||'·'), 'var(--p2)', p2seq)}
        ${p2seq.length?`<div style="display:flex;gap:14px;font-size:11px;margin-top:4px;padding:0 2px;">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--oklt);border:1px solid var(--okbd);display:inline-block;"></span>Same as initial</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:2px;background:var(--errlt);border:1px solid var(--errbd);display:inline-block;"></span>Changed</span>
        </div>`:''}
      </div>`;

      h+=`<div class="sec"><div class="btn-row">
        <button class="btn btn-p2" onclick="logSequence2(1)" ${!isComplete2(1)?'disabled':''}>Log output sequence</button>
        <button class="btn" onclick="showLogModal('p2')">View output sequences log</button>
      </div></div>`;
    }
  }

  // Log feedback
  if(S.lastLogged&&S.lastLogged.who==='p2'&&Date.now()-S.lastLogged.time<2000){
    h=`<div style="background:var(--oklt);border:2px solid var(--okbd);border-radius:6px;padding:12px 18px;margin:14px 20px;display:flex;align-items:center;gap:10px;font-weight:600;color:var(--ok);font-size:15px;">
      <span style="font-size:20px;">✓</span> Sequence logged — TX-0${S.lastLogged.txIdx+1}
    </div>`+h;
  }

  if(S.phase===0){
    document.getElementById('view-p2').classList.add('phase-intro');
    document.getElementById('p2-shared').innerHTML='';
    document.getElementById('p2-content').innerHTML=`<div class="intro-screen">
      <div class="intro-signal"><div class="intro-signal-dot"></div>SECURE TERMINAL — RESTRICTED ACCESS</div>
      <div class="intro-card">
        <div class="intro-header">Dr. J. Searle — Personal Workstation</div>
        <div class="intro-title">Welcome, Dr. Searle.</div>
        <div class="intro-divider"></div>

          <div style="font-family:var(--mono);font-size:9px;color:#4a7090;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;">

          <div style="font-family:var(--mono);font-size:11px;color:#8090a8;margin-bottom:12px;">SUBJ: &nbsp;<span style="color:#c0d8f0">Transmission received. Awaiting response.</span></div>

          <div style="font-family:var(--mono);font-size:19px;color:#c0d8f0;letter-spacing:8px;margin-top:7px;">▶ → ◀ → ★ → ♦ → ♠</div>
        </div>
        <button class="intro-begin" onclick="beginGame()">Access XENOX-7 Communication Terminal →</button>
      </div>

  }

  const logBanner=(S.lastLogged&&S.lastLogged.who==='p2'&&Date.now()-S.lastLogged.time<2000)
    ?`<div style="background:var(--oklt);border-bottom:2px solid var(--okbd);padding:8px 12px;display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ok);font-size:13px;position:sticky;top:36px;z-index:9;">
        <span>✓</span> Sequence logged — TX-0${S.lastLogged.txIdx+1}
      </div>`:''

  const shared=sharedScreenHTML();
  document.getElementById('p2-shared').innerHTML=
    `<div class="col-hdr col-hdr-shared"><span class="badge b-s">Shared Terminal</span><span class="phdr-t">XENOX-7 Transmission Terminal</span></div>`+shared;
  document.getElementById('p2-content').innerHTML=
    `<div class="col-hdr col-hdr-private"><span class="badge b-2">Player 2</span><span class="badge b-sec">Secret</span><span class="phdr-t">${S.phase===1?'Probability Scores':S.p2activeTx===0?'Lattice + Probs':'Translations'}</span></div>`
    +logBanner+h;
}

/* ═══════════════════════════════════════════
   SYNC — STATE FIELDS THAT ARE LOCAL-ONLY
   These are per-screen UI flags that should NOT
   be synced to other players' screens.
═══════════════════════════════════════════ */
const LOCAL_KEYS = new Set([
  'showLogModal', 'showConfirm', 'showNotesModal',
  'showResultModal', 'lastLogged'
]);

function syncableState() {
  const s = {};
  for (const k of Object.keys(S)) {
    if (!LOCAL_KEYS.has(k)) s[k] = S[k];
  }
  return s;
}

function applyRemoteState(remote) {
  // Merge remote state, preserving our local-only flags
  for (const k of Object.keys(remote)) {
    if (!LOCAL_KEYS.has(k)) S[k] = remote[k];
  }
  // If phase changed to 2 and result modal not yet shown, show it
  if (S.p2transmitted && S.p2result && !S.showResultModal) {
    S.showResultModal = true;
  }
  renderModal();
  renderAll();
}

/* ═══════════════════════════════════════════
   WEBSOCKET
═══════════════════════════════════════════ */
let ws = null;
let wsConnected = false;

function connectWS(forceReset = false) {
  // Derive WebSocket URL from current page URL
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${proto}//${location.host}`;

  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    wsConnected = true;
    updateConnectionBadge(true);
    console.log('WebSocket connected');
    if (forceReset) {
      S = freshState();
      renderAll();
      syncState();
      console.log('Fresh state broadcasted');
    }
  };

  ws.onmessage = (event) => {
    let msg;
    try { msg = JSON.parse(event.data); } catch { return; }
    // Handle both new multi-puzzle format and legacy format
    if (msg.type === 'state' && (!msg.puzzle || msg.puzzle === 'p2')) {
      applyRemoteState(msg.state);
    }
    // On first connect server sends full room state — extract puzzle 2 slice
    if (msg.type === 'room' && msg.room && msg.room.p2) {
      applyRemoteState(msg.room.p2);
    }
  };

  ws.onclose = () => {
    wsConnected = false;
    updateConnectionBadge(false);
    console.log('WebSocket disconnected — reconnecting in 2s');
    setTimeout(() => connectWS(false), 2000); // reconnect without reset
  };

  ws.onerror = (err) => {
    console.warn('WebSocket error:', err);
    ws.close();
  };
}

function syncState() {
  if (ws && wsConnected) {
    ws.send(JSON.stringify({ type: 'state', puzzle: 'p2', state: syncableState() }));
  }
}

function updateConnectionBadge(connected) {
  const dot = document.getElementById('conn-dot');
  const label = document.getElementById('conn-label');
  if (!dot || !label) return;
  dot.style.background = connected ? '#5bf5a8' : '#f07070';
  label.textContent = connected ? 'XENOX-7 SIGNAL ACTIVE' : 'RECONNECTING...';
}

// Patch every state-mutating function to call syncState after renderAll
const _origRenderAll = renderAll;
function renderAll() { _origRenderAll(); }

function syncAndRender() { renderAll(); syncState(); }

// Re-wire all actions to sync after mutation
const _beginGame = beginGame;
function beginGame() { S.phase = 1; syncAndRender(); }

const _selectCell1 = selectCell1;
function selectCell1(txIdx, col, row) {
  const g = LATTICES[txIdx][col][row];
  S.p1sel[txIdx][col] = S.p1sel[txIdx][col] === g ? null : g;
  syncAndRender();
}

const _selectCell2 = selectCell2;
function selectCell2(txIdx, col, row) {
  const g = LATTICES[txIdx][col][row];
  S.p2sel[txIdx][col] = S.p2sel[txIdx][col] === g ? null : g;
  S.wordInputs[txIdx][col] = null;
  syncAndRender();
}

const _setActiveTx = setActiveTx;
function setActiveTx(i) { S.activeTx = i; syncAndRender(); }

const _setP2ActiveTx = setP2ActiveTx;
function setP2ActiveTx(i) { S.p2activeTx = i; syncAndRender(); }

const _clearSel1 = clearSel1;
function clearSel1(txIdx) {
  S.p1sel[txIdx] = [null, null, null, null, null];
  syncAndRender();
}

const _clearSel2 = clearSel2;
function clearSel2(txIdx) {
  S.p2sel[txIdx] = [null, null, null, null, null];
  S.wordInputs[txIdx] = [null, null, null, null, null];
  syncAndRender();
}

const _logSequence1 = logSequence1;
function logSequence1(txIdx) {
  if (!isComplete1(txIdx)) return;
  const seq = [...S.p1sel[txIdx]];
  const verdict = computeVerdict(txIdx, seq);
  const probs = getPathProbs(seq);
  const key = seqKey(seq);
  const logs = S.p1logs[txIdx];
  const existing = logs.findIndex(e => seqKey(e.seq) === key);
  if (existing >= 0) {
    const entry = logs.splice(existing, 1)[0];
    entry.count = (entry.count || 1) + 1;
    logs.push(entry);
  } else {
    logs.push({ seq, verdict, probs, n: logs.length + 1, count: 1 });
  }
  S.lastLogged = { who: 'p1', txIdx, time: Date.now() };
  setTimeout(() => { if (S.lastLogged && Date.now() - S.lastLogged.time >= 1900) S.lastLogged = null; renderAll(); }, 2000);
  syncAndRender();
}

const _logSequence2 = logSequence2;
function logSequence2(txIdx) {
  if (!isComplete2(txIdx)) return;
  const seq = [...S.p2sel[txIdx]];
  const verdict = computeVerdict(txIdx, seq);
  const probs = getPathProbs(seq);
  const key = seqKey(seq);
  const logs = S.p2logs[txIdx];
  const existing = logs.findIndex(e => seqKey(e.seq) === key);
  if (existing >= 0) {
    const entry = logs.splice(existing, 1)[0];
    entry.count = (entry.count || 1) + 1;
    logs.push(entry);
  } else {
    logs.push({ seq, verdict, probs, n: logs.length + 1, count: 1 });
  }
  S.lastLogged = { who: 'p2', txIdx, time: Date.now() };
  setTimeout(() => { if (S.lastLogged && Date.now() - S.lastLogged.time >= 1900) S.lastLogged = null; renderAll(); }, 2000);
  syncAndRender();
}

const _confirmTransmit = confirmTransmit;
function confirmTransmit() {
  for (let i = 0; i < 2; i++) {
    const ll = lastLog1(i);
    S.finalVerdicts[i] = ll ? ll.verdict : 'hallucination';
  }
  S.transmitted = true; S.showConfirm = false; S.phase = 2; S.p2activeTx = 0;
  S.showResultModal = false;
  syncAndRender(); renderModal();
}

const _confirmTransmit2 = confirmTransmit2;
function confirmTransmit2() {
  for (let i = 0; i < 2; i++) {
    const ll = lastLog2(i) || lastLog1(i);
    S.finalVerdicts[i] = ll ? ll.verdict : 'hallucination';
  }
  S.p2transmitted = true; S.showConfirm = false;
  const bothVerified = S.p2logs[0].length > 0 && S.p2logs[1].length > 0
    && lastLog2(0).verdict === 'verified' && lastLog2(1).verdict === 'verified';
  S.p2result = bothVerified ? 'win' : 'lose';
  S.showResultModal = true;
  syncAndRender(); renderModal();
}

const _resetPhase2 = resetPhase2;
function resetPhase2() {
  S.p2activeTx = 0;
  S.p2sel = [[null,null,null,null,null],[null,null,null,null,null]];
  S.p2logs = [[], []];
  S.wordInputs = [[null,null,null,null,null],[null,null,null,null,null]];
  S.inputTranslation = ['', ''];
  S.inputTransSubmitted = [false, false];
  S.outputTransDone = [false, false];
  S.p2transmitted = false;
  S.p2result = null;
  S.showResultModal = false;
  syncAndRender(); renderModal();
}

const _resetGame = resetGame;
function resetGame() {
  S = freshState();
  syncAndRender(); renderModal();
}

/* ═══════════════════════════════════════════
   HASH-BASED VIEW LOCKING
   Sets a global LOCKED_VIEW so render functions
   only paint their own screen.
   #p1     → only renderP1 runs, tab bar hidden
   #p2     → only renderP2 runs, tab bar hidden
   #shared → dedicated shared-only view, tab bar hidden
   (no hash) → normal local testing mode
═══════════════════════════════════════════ */
let LOCKED_VIEW = null; // 'p1' | 'p2' | 'shared' | null

function initView() {
  const hash = window.location.hash.replace('#', '').toLowerCase();
  if (!['p1', 'p2', 'shared'].includes(hash)) return; // local testing, no lock

  LOCKED_VIEW = hash;
  document.querySelector('.view-tabs').style.display = 'none';

  if (hash === 'p1') {
    // Only show p1 panel
    document.getElementById('view-p1').classList.add('active');
    document.getElementById('view-p2').classList.remove('active');

  } else if (hash === 'p2') {
    // Only show p2 panel
    document.getElementById('view-p2').classList.add('active');
    document.getElementById('view-p1').classList.remove('active');

  } else if (hash === 'shared') {
    // Build a dedicated shared panel that spans full width
    document.getElementById('view-p1').classList.remove('active');
    document.getElementById('view-p2').classList.remove('active');

    const panel = document.createElement('div');
    panel.id = 'view-shared';
    panel.className = 'view-panel active';
    // Single column: shared terminal fills the whole panel
    panel.style.gridTemplateColumns = '1fr';
    panel.innerHTML = `
      <div class="col-shared" id="shared-main" style="border-right:none;max-width:900px;margin:0 auto;width:100%;"></div>
      <div id="shared-private-empty" style="display:none;"></div>
    `;
    document.querySelector('.app').appendChild(panel);
  }
}

// Guard: only render the locked view (or both for local testing)
function renderAll() {
  if (LOCKED_VIEW === 'p1') { renderP1(); return; }
  if (LOCKED_VIEW === 'p2') { renderP2(); return; }
  if (LOCKED_VIEW === 'shared') { renderSharedOnly(); return; }
  renderP1(); renderP2(); // local testing — render both
}

function renderSharedOnly() {
  const el = document.getElementById('shared-main');
  if (!el) return;
  if (S.phase === 0) {
    document.getElementById('view-shared').classList.add('phase-intro');
    el.innerHTML = `
      <div class="col-hdr col-hdr-shared" style="max-width:900px;">
        <span class="badge b-s">Shared Terminal</span>
        <span class="phdr-t">XENOX-7 Transmission Terminal</span>
      </div>
      <div style="display:flex;align-items:center;justify-content:center;height:80vh;background:#0c0e1a;">
        <div class="intro-card" style="max-width:560px;width:90%;">
          <div class="intro-header">Dr. J. Searle — Personal Workstation</div>
          <div class="intro-title">Welcome, Dr. Searle.</div>
          <div class="intro-divider"></div>
          <div style="background:#0a1828;border:1px solid #1e3050;border-radius:6px;padding:12px 16px;margin-bottom:18px;">
            <div style="font-family:var(--mono);font-size:9px;color:#4a7090;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px;display:flex;justify-content:space-between;">
              <span>New Message</span><span style="color:#5bf5a8">● Unread</span>
            </div>
            <div style="font-family:var(--mono);font-size:11px;color:#8090a8;margin-bottom:4px;">FROM: <span style="color:#c0d8f0">XENOX-7</span></div>
            <div style="font-family:var(--mono);font-size:11px;color:#8090a8;margin-bottom:12px;">SUBJ: <span style="color:#c0d8f0">Transmission received. Awaiting response.</span></div>
            <div style="font-family:var(--mono);font-size:19px;color:#c0d8f0;letter-spacing:8px;border-top:1px solid #1e3050;padding-top:12px;">▲ → ▼ → ◆ → ● → ■</div>
            <div style="font-family:var(--mono);font-size:19px;color:#c0d8f0;letter-spacing:8px;margin-top:7px;">▶ → ◀ → ★ → ♦ → ♠</div>
          </div>
          <button class="intro-begin" onclick="beginGame()">Access XENOX-7 Communication Terminal →</button>
        </div>
      </div>`;
  } else {
    document.getElementById('view-shared').classList.remove('phase-intro');
    const shared = sharedScreenHTML();
    el.innerHTML = `
      <div class="col-hdr col-hdr-shared">
        <span class="badge b-s">Shared Terminal</span>
        <span class="phdr-t">XENOX-7 Transmission Terminal</span>
      </div>
      ${shared}`;
  }
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
const sigEl = document.querySelector('.sig');
if (sigEl) {
  sigEl.innerHTML = '<div class="sig-dot" id="conn-dot"></div><span id="conn-label">CONNECTING...</span>';
}

initView();
renderAll();

if (location.protocol !== 'file:') {
  // If ?reset is in the URL, broadcast a fresh state once connected
  const forceReset = location.search.includes('reset');
  connectWS(forceReset);
} else {
  updateConnectionBadge(true);
  document.getElementById('conn-label').textContent = 'LOCAL MODE';
}


</script>
