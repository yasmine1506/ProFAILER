<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTS Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --font:'IBM Plex Sans',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --radius-sm:6px; --radius-md:10px; --radius-lg:14px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);
  --shadow-md:0 4px 12px rgba(0,0,0,.12);

  /* PARTS colours */
  --purple-bg:#EEEDFE;--purple-border:#AFA9EC;--purple-accent:#534AB7;--purple-text:#3C3489;
  --green-bg:#EAF3DE;--green-border:#97C459;--green-accent:#4A8C1C;--green-text:#27500A;
  --pink-bg:#FBEAF0;--pink-border:#ED93B1;--pink-accent:#C0395A;--pink-text:#72243E;
  --orange-bg:#FAEEDA;--orange-border:#EF9F27;--orange-accent:#C07A10;--orange-text:#633806;
  --blue-bg:#E6F1FB;--blue-border:#85B7EB;--blue-accent:#2B6CB0;--blue-text:#0C447C;

  /* Neutrals */
  --bg:#F7F7F8;--surface:#FFFFFF;--border:#E5E7EB;
  --text-primary:#111827;--text-secondary:#6B7280;--text-muted:#9CA3AF;

  /* Shared design tokens (matches puzzles 1 & 2) */
  --ok:#147a50;--oklt:#d6f0e4;--okbd:#7acba8;
  --err:#b81c1c;--errlt:#fde8e8;--errbd:#e8a0a0;
  --p1:#1a5fa8;--p1lt:#deeaf8;--p1bd:#8ab8e0;
  --p2:#6622aa;--p2lt:#ede0f8;--p2bd:#bb99e0;
}

html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text-primary);font-family:var(--font);font-size:15px;line-height:1.5;}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── Header ── */
.app-header{background:#18182e;padding:6px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo{font-family:var(--mono);font-size:13px;font-weight:600;color:#e0f0ff;}
.logo span{color:#607090;font-size:10px;font-weight:400;margin-left:6px;}
.sig{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:#607090;font-family:var(--mono);}
.sig-dot{width:6px;height:6px;border-radius:50%;background:#5bf5a8;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Tabs ── */
.view-tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0;}
.tab-btn{flex:1;padding:8px 10px;background:transparent;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;
  color:var(--text-muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.tab-btn:hover{color:var(--text-secondary);background:var(--bg);}
.tab-btn.tab-1{color:var(--p1);border-bottom-color:var(--p1);background:#fff;}
.tab-btn.tab-2{color:var(--p2);border-bottom-color:var(--p2);background:#fff;}

/* ── Player panels — full width, no split ── */
.view-panel{display:none;flex:1;overflow-y:auto;height:calc(100vh - 62px);padding:1rem;}
.view-panel::-webkit-scrollbar{width:4px;}
.view-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.view-panel.active{display:block;}

/* ── Prompt panel ── */
.prompt-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  overflow:hidden;box-shadow:var(--shadow-sm);}
.prompt-header{display:flex;align-items:center;gap:.4rem;padding:.5rem .9rem;
  background:var(--bg);border-bottom:1px solid var(--border);}
.prompt-dot{width:10px;height:10px;border-radius:50%;background:var(--border);}
.prompt-title{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.06em;
  text-transform:uppercase;margin-left:.2rem;}
.prompt-body{padding:.9rem 1.1rem;}
.prompt-bubble{font-size:14px;color:var(--text-primary);line-height:2.1;
  background:var(--bg);border-radius:var(--radius-sm);padding:.75rem 1rem;}
.blank{display:inline-block;min-width:80px;padding:.1rem .4rem;border-radius:4px;
  border:1.5px dashed var(--border);background:var(--surface);color:var(--text-muted);
  font-weight:600;text-align:center;transition:all .3s;}
.blank.filled-persona {background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple-text);border-style:solid;}
.blank.filled-recipient{background:var(--pink-bg);  border-color:var(--pink-border);  color:var(--pink-text);border-style:solid;}
.blank.filled-tone    {background:var(--orange-bg); border-color:var(--orange-border);color:var(--orange-text);border-style:solid;}
.hl-blue {background:var(--blue-bg);  color:var(--blue-text); border-radius:3px;padding:1px 5px;}
.hl-green{background:var(--green-bg); color:var(--green-text);border-radius:3px;padding:1px 5px;}

/* ── Locked options ── */
.opt.locked-on {border-color:var(--green-border);background:var(--green-bg);color:var(--green-text);cursor:default;pointer-events:none;opacity:1;}
.opt.locked-off{opacity:.35;cursor:default;pointer-events:none;}

/* ── PARTS lock row (P2) ── */
.parts-lock-row{display:flex;align-items:center;gap:1rem;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-lg);padding:.9rem 1.1rem;
  box-shadow:var(--shadow-sm);}
.lock-wrap{display:flex;flex-direction:column;align-items:center;gap:.25rem;flex-shrink:0;}
.lock-emoji{font-size:26px;transition:transform .3s;}
.lock-emoji.open{transform:rotate(-15deg);}
.lock-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
.lock-label.green{color:#1D9E75;}
.parts-letters{display:flex;gap:.5rem;}

/* ── Output card (P1 phase 2) ── */
.output-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:1rem 1.2rem;box-shadow:var(--shadow-sm);}
.output-card-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;
  letter-spacing:.06em;font-weight:600;margin-bottom:.6rem;}
.output-bullets{list-style:none;display:flex;flex-direction:column;gap:.45rem;}
.output-bullets li{font-size:14px;color:var(--text-primary);line-height:1.6;
  padding-left:1.2rem;position:relative;}
.output-bullets li::before{content:'•';position:absolute;left:0;color:var(--text-muted);}

  display:flex;align-items:center;gap:8px;font-weight:600;color:var(--ok);font-size:13px;
  position:sticky;top:0;z-index:9;margin:-1rem -1rem 1rem -1rem;}

/* ── Toggle bar (local testing only) ── */
.toggle-bar{display:flex;gap:.4rem;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:.35rem;width:fit-content;margin-bottom:1rem;
  box-shadow:var(--shadow-sm);}
.tog-btn{padding:.4rem 1.2rem;border-radius:var(--radius-md);font-size:13px;font-weight:500;
  cursor:pointer;border:none;background:transparent;color:var(--text-secondary);transition:background .15s,color .15s;}
.tog-btn.active{background:var(--bg);color:var(--text-primary);border:1px solid var(--border);box-shadow:var(--shadow-sm);}

/* ── Hint box ── */
.hint-box{display:flex;align-items:flex-start;gap:.75rem;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-md);padding:.85rem 1rem;
  box-shadow:var(--shadow-sm);}
.hint-avatar{width:2rem;height:2rem;border-radius:50%;background:var(--bg);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--text-secondary);flex-shrink:0;}
.hint-text{font-size:14px;color:var(--text-secondary);line-height:1.55;}

/* ── PARTS tiles ── */
.parts-display{display:flex;align-items:center;gap:.5rem;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-md);padding:.75rem 1rem;
  box-shadow:var(--shadow-sm);}
.parts-label{font-size:11px;font-weight:600;color:var(--text-muted);letter-spacing:.06em;
  text-transform:uppercase;margin-right:.25rem;}
.parts-tiles{display:flex;gap:.4rem;flex-wrap:wrap;}
.parts-tile{width:2.4rem;height:2.4rem;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1rem;
  border:1.5px solid transparent;position:relative;cursor:default;user-select:none;}
.parts-tile.tip-enabled{cursor:pointer;}
.tile-tooltip{display:none;position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#1f2937;color:#fff;border-radius:var(--radius-sm);padding:.5rem .75rem;
  font-size:12px;width:180px;z-index:20;line-height:1.4;box-shadow:var(--shadow-md);}
.tile-tooltip::before{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-bottom-color:#1f2937;}
.tt-name{font-weight:600;margin-bottom:.2rem;}
.parts-tile.tip-enabled:focus .tile-tooltip,
.parts-tile.tip-enabled:hover .tile-tooltip{display:block;}

/* ── Option buttons ── */
.panel{border-radius:var(--radius-lg);padding:.85rem 1rem;display:flex;flex-direction:column;gap:.5rem;
  border:1px solid transparent;}
.panel-purple{background:var(--purple-bg);border-color:var(--purple-border);}
.panel-green {background:var(--green-bg); border-color:var(--green-border);}
.panel-pink  {background:var(--pink-bg);  border-color:var(--pink-border);}
.panel-orange{background:var(--orange-bg);border-color:var(--orange-border);}
.panel-blue  {background:var(--blue-bg);  border-color:var(--blue-border);grid-column:1/-1;}
.panel-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  text-align:center;min-height:14px;opacity:0;transition:opacity .4s;}
.panel-label.visible{opacity:1;}
.panel-purple .panel-label{color:var(--purple-accent);}
.panel-green  .panel-label{color:var(--green-accent);}
.panel-pink   .panel-label{color:var(--pink-accent);}
.panel-orange .panel-label{color:var(--orange-accent);}
.panel-blue   .panel-label{color:var(--blue-accent);}
.panel-locked-note{font-size:10px;text-align:center;color:var(--text-muted);margin-top:-.1rem;}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem;}
.opts.four-col{grid-template-columns:repeat(4,1fr);}
.opt{display:flex;flex-direction:column;align-items:center;gap:.2rem;
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-md);
  padding:.5rem .4rem;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;
  color:var(--text-primary);text-align:center;}
.opt:hover:not(:disabled){border-color:var(--text-secondary);}
.opt.active{border-color:var(--purple-accent);background:#f0effd;color:var(--purple-accent);}
.opt.p2-sel{border-color:var(--blue-accent);background:var(--blue-bg);color:var(--blue-text);}
.opt.correct{border-color:var(--ok);background:var(--oklt);color:var(--ok);cursor:default;pointer-events:none;}
.opt.wrong{border-color:var(--err);background:var(--errlt);color:var(--err);}
.opt:disabled{opacity:.45;cursor:not-allowed;}
.opt-label{font-size:11px;}

/* ── Costume display ── */
.costume-display{display:flex;align-items:center;justify-content:center;gap:1.5rem;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:1rem;box-shadow:var(--shadow-sm);}
.costume-slot{display:flex;flex-direction:column;align-items:center;gap:.35rem;}
.costume-emoji{font-size:2.5rem;min-height:3rem;display:flex;align-items:center;}
.costume-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;font-weight:600;color:var(--text-muted);}
.costume-blank{font-size:13px;font-weight:600;color:var(--text-secondary);
  background:var(--bg);border:1px dashed var(--border);border-radius:var(--radius-sm);
  padding:.2rem .6rem;min-width:80px;text-align:center;transition:all .3s;}
.blank.filled-persona {background:var(--purple-bg);border-color:var(--purple-border);color:var(--purple-text);}
.blank.filled-recipient{background:var(--pink-bg);  border-color:var(--pink-border);  color:var(--pink-text);}
.blank.filled-tone    {background:var(--orange-bg); border-color:var(--orange-border);color:var(--orange-text);}

/* ── Panels grid ── */
.panels-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}

/* ── Generate/Submit buttons ── */
.gen-btn,.submit-btn{width:100%;padding:.75rem;border-radius:var(--radius-md);
  font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;}
.gen-btn{background:#1f2937;color:#fff;}
.gen-btn:hover:not(:disabled){background:#374151;}
.gen-btn:disabled{opacity:.45;cursor:not-allowed;}
.submit-btn{background:var(--blue-accent);color:#fff;}
.submit-btn:hover:not(:disabled){background:#1d4ed8;}
.submit-btn:disabled{opacity:.45;cursor:not-allowed;}
.submit-row{display:flex;align-items:center;gap:.75rem;}
.attempts-counter{font-size:13px;color:var(--text-secondary);flex-shrink:0;}

/* ── Response cards (P2 sees P1's generated stories) ── */
.response-stack{display:flex;flex-direction:column;gap:.6rem;}
.response-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:.85rem 1rem;box-shadow:var(--shadow-sm);}
.response-meta{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;letter-spacing:.03em;}
.response-text{font-size:14px;color:var(--text-primary);line-height:1.6;}
.followup-note{margin-top:.6rem;padding:.5rem .75rem;background:#fffbeb;border-left:3px solid #f59e0b;
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;font-size:13px;color:#92400e;}

/* ── Attempt history chips (P2 puzzle phase 2) ── */
.attempt-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);
  padding:.75rem 1rem;box-shadow:var(--shadow-sm);}
.attempt-meta{font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:.4rem;}
.attempt-chips{display:flex;flex-wrap:wrap;gap:.3rem;}
.chip{font-size:11px;font-weight:600;padding:.2rem .5rem;border-radius:4px;}
.chip-ok{background:var(--oklt);color:var(--ok);border:1px solid var(--okbd);}
.chip-bad{background:var(--errlt);color:var(--err);border:1px solid var(--errbd);}

/* ── Phase transition banner ── */
.phase-banner{background:#18182e;border-radius:var(--radius-md);padding:1rem 1.25rem;
  color:#c0d8f0;font-family:var(--mono);font-size:13px;line-height:1.7;margin-bottom:1rem;}
.phase-banner-title{color:#5bf5a8;font-weight:600;font-size:14px;margin-bottom:.4rem;letter-spacing:.04em;}

/* ── Lock display ── */
.lock-display{display:flex;align-items:center;gap:.6rem;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius-md);padding:.6rem 1rem;
  box-shadow:var(--shadow-sm);font-size:13px;}
.lock-emoji{font-size:1.4rem;transition:all .4s;}
.lock-label{font-weight:600;color:var(--text-secondary);}
.lock-label.green{color:var(--ok);}

/* ── Modal ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;
  display:flex;align-items:center;justify-content:center;padding:1rem;}
.modal-overlay.hidden{display:none;}
.modal-box{background:#fff;border-radius:var(--radius-lg);padding:1.5rem;max-width:460px;
  width:100%;box-shadow:0 8px 40px rgba(0,0,0,.25);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:.75rem;}
.modal-title.success{color:var(--ok);}
.modal-body{font-size:14px;color:var(--text-secondary);line-height:1.7;white-space:pre-line;margin-bottom:1.25rem;}
.modal-close-btn{width:100%;padding:.6rem;border-radius:var(--radius-md);border:1px solid var(--border);
  background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;color:var(--text-primary);}
.modal-close-btn:hover{background:var(--border);}

/* ── Section spacing ── */
.section{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem;}
.section-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text-muted);display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="logo">PARTS Puzzle <span>DEER Prototype — Puzzle 3</span></div>
    <div class="sig"><div class="sig-dot" id="conn-dot"></div><span id="conn-label">CONNECTING...</span></div>
  </div>
  <div class="view-tabs" id="view-tabs">
    <button class="tab-btn tab-1" id="tab-p1" onclick="switchView('p1')">Player 1</button>
    <button class="tab-btn" id="tab-p2" onclick="switchView('p2')">Player 2</button>
  </div>
  <div class="view-panel active" id="view-p1"><div id="p1-content"></div></div>
  <div class="view-panel" id="view-p2"><div id="p2-content"></div></div>
</div>
<div id="modal-root"></div>

// ══════════════════════════════════════════════════════════
// WIN CONDITIONS & HINTS
// ══════════════════════════════════════════════════════════
const OW = { persona:"Shakespearean Playwright", recipient:"Musician", tones:["Angry Tone","Sad Tone"] };
const AW = { persona:"Surfer Dude", recipient:"Chef", tone:"Serious Tone" };

const HINTS_O = [
  "Hmm I want something that WOWS my teacher. Hmmm I did see her read Romeo and Juliet the other day…",
  "This doesn't feel creative enough. I need to make this more personalized to me. My favorite hobby is playing music…",
  "Something's not quite right… the assignment is missing that emotional aspect to it."
];
const HINTS_A = [
  "You know, my teacher always says to go with the flow and keep it chill… kind of like someone who rides waves for a living.",
  "And she loves it when stories have a real-world angle — like something you'd find in a kitchen or at a dinner table.",
  "She also mentioned the best stories have a certain gravity to them… nothing too playful, nothing too emotional. Just focused and composed."
];

const P2_CORRECT = {
  persona:"Surfer Dude", aim:"elevator pitch",
  recipient:"Chef", tone:"Friendly", structure:"Bullet points"
};

// ══════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════
const LOCAL_KEYS = new Set(['showModal','modalData','lastGenerated']);

function freshState() {
  return {
    phase: 1,  // 1 = phase 1 active, 2 = phase 2 active
    p1: { persona:null, recipient:null, tone:null },
    g: {
      count:0, winShown:false, earlyGuessed:false,
      hint1:false, hint2:false, hint3:false,
      pOk:false, rOk:false, tOk:false
    },
    p1History: [],  // [{meta, story, hint}] — synced to P2
    p2sel: { persona:null, aim:null, recipient:null, tone:null, structure:null },
    p2left: 3,
    p2done: false,
    p2Attempts: [],  // [{snapshot, results}] — for rendering attempt history
    // local-only
    showModal: false,
    modalData: null,
    lastGenerated: null,
  };
}

let S = freshState();

function syncableState() {
  const out = {};
  for (const k of Object.keys(S)) {
    if (!LOCAL_KEYS.has(k)) out[k] = S[k];
  }
  return out;
}

function applyRemoteState(remote) {
  for (const k of Object.keys(remote)) {
    if (!LOCAL_KEYS.has(k)) S[k] = remote[k];
  }
  renderAll();
}

// ══════════════════════════════════════════════════════════
// GAME LOGIC (pure — no DOM touches)
// ══════════════════════════════════════════════════════════
function winPersona()   { return S.g.earlyGuessed ? AW.persona    : OW.persona; }
function winRecipient() { return S.g.earlyGuessed ? AW.recipient  : OW.recipient; }
function winTones()     { return S.g.earlyGuessed ? [AW.tone]     : OW.tones; }

function isOriginalWin() {
  return S.p1.persona === OW.persona && S.p1.recipient === OW.recipient && OW.tones.includes(S.p1.tone);
}
function isAltWin() {
  return S.p1.persona === AW.persona && S.p1.recipient === AW.recipient && S.p1.tone === AW.tone;
}

function tryChecks() {
  if (!S.g.pOk && S.g.hint1 && S.p1.persona === winPersona())       S.g.pOk = true;
  if (!S.g.rOk && S.g.hint2 && S.p1.recipient === winRecipient())   S.g.rOk = true;
  if (!S.g.tOk && S.g.hint3 && winTones().includes(S.p1.tone))      S.g.tOk = true;
}

// ══════════════════════════════════════════════════════════
// ACTIONS
// ══════════════════════════════════════════════════════════
function setP1Option(group, val) {
  S.p1[group] = val;
  tryChecks();
  syncAndRender();
}

function generateStory() {
  if (!S.p1.persona || !S.p1.recipient || !S.p1.tone || S.g.winShown) return;
  S.g.count++;

  const story = STORIES[S.p1.persona]?.[S.p1.recipient]?.[S.p1.tone] || 'Story not found.';
  const hints = S.g.earlyGuessed ? HINTS_A : HINTS_O;
  let hint = null;

  if (!S.g.earlyGuessed && S.g.count <= 3 && isOriginalWin()) S.g.earlyGuessed = true;

  if (S.g.count === 4) { hint = hints[0]; S.g.hint1 = true; }
  else if (S.g.count === 5) { hint = hints[1]; S.g.hint2 = true; }
  else if (S.g.count === 6) { hint = hints[2]; S.g.hint3 = true; }

  tryChecks();

  const toneDisplay = S.p1.tone.replace(' Tone','');
  const meta = `Attempt ${S.g.count} — ${S.p1.persona} · ${S.p1.recipient} · ${toneDisplay}`;
  S.p1History.unshift({ meta, story, hint });  // prepend — newest first

  const win = (!S.g.earlyGuessed && isOriginalWin() && S.g.count > 3) ||
              (S.g.earlyGuessed && isAltWin() && S.g.count > 3);

  if (win) {
    S.g.winShown = true;
    S.lastGenerated = 'win';
  } else {
    S.lastGenerated = 'generated';
  }

  syncAndRender();

  // Show modal locally after render
  if (win) {
    showModal('🎉 Perfect match!', 'A response has been generated to your teammate.\nMoving to Phase 2!', true, goToPhase2);
  } else {
    showModal('✓ Success', 'A response has been generated to your teammate.', false, null);
  }
}

function goToPhase2() {
  S.phase = 2;
  syncAndRender();
}

function setP2Option(cat, val) {
  if (S.p2done) return;
  S.p2sel[cat] = val;
  syncAndRender();
}

function submitP2() {
  if (S.p2done) return;
  const cats = ['persona','aim','recipient','tone','structure'];
  if (cats.some(c => !S.p2sel[c])) {
    showModal('Incomplete', 'Please select one option in each category before submitting.', false, null);
    return;
  }

  S.p2left--;
  const attemptNum = 3 - S.p2left;
  const results = {
    persona:   S.p2sel.persona   === P2_CORRECT.persona,
    aim:       S.p2sel.aim?.toLowerCase()       === P2_CORRECT.aim.toLowerCase(),
    recipient: S.p2sel.recipient === P2_CORRECT.recipient,
    tone:      S.p2sel.tone      === P2_CORRECT.tone,
    structure: S.p2sel.structure?.toLowerCase() === P2_CORRECT.structure.toLowerCase(),
  };
  const allOk = Object.values(results).every(Boolean);

  S.p2Attempts.unshift({ snapshot: {...S.p2sel}, results, attemptNum });

  // Lock correct categories
  cats.forEach(cat => { if (!results[cat]) S.p2sel[cat] = null; });

  if (allOk) {
    S.p2done = true;
    syncAndRender();
    showModal('🎉 Correct!', 'You identified all PARTS settings perfectly!', true, null);
  } else if (S.p2left === 0) {
    S.p2done = true;
    syncAndRender();
    showModal('Out of attempts', 'The correct answers have been revealed.', false, null);
  } else {
    syncAndRender();
    showModal('Not quite', 'Some answers are wrong — keep trying for those!', false, null);
  }
}

function resetGame() {
  S = freshState();
  renderModal();
  syncAndRender();
}

// MODAL (local-only — not synced)

let _modalCb = null;

function showModal(title, body, success, cb) {
  S.showModal = true;
  S.modalData = { title, body, success };
  _modalCb = cb || null;
  renderModal();
}

function closeModal() {
  S.showModal = false;
  S.modalData = null;
  const cb = _modalCb; _modalCb = null;
  renderModal();
  if (cb) cb();
}

function renderModal() {
  const root = document.getElementById('modal-root');
  if (!S.showModal || !S.modalData) { root.innerHTML = ''; return; }
  const { title, body, success } = S.modalData;
  root.innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box">
        <div class="modal-title${success?' success':''}">${title}</div>
        <div class="modal-body">${body}</div>
        <button class="modal-close-btn" onclick="closeModal()">Close</button>
      </div>
    </div>`;
}

  if (!S.p2done) {
    const allSelected = cats.every(c => S.p2sel[c] || lockedCorrect[c]);
    h += `<div class="section">
      <div class="submit-row">
        <button class="submit-btn" onclick="submitP2()" ${allSelected?'':'disabled'}>Submit</button>
        <span class="attempts-counter">${S.p2left} attempt${S.p2left===1?'':'s'} remaining</span>
      </div>
    </div>`;
  } else {
    h += `<div class="section">
      <div class="submit-row">
        <button class="submit-btn" disabled>Submit</button>
        <span class="attempts-counter">${S.p2done && S.p2Attempts[0]?.results && Object.values(S.p2Attempts[0].results).every(Boolean) ? '✅ Solved!' : 'No attempts remaining'}</span>
      </div>
    </div>`;
  }

  if (S.p2Attempts.length > 0) {
    h += `<div class="section">
      <div class="section-label">Previous attempts</div>
      <div class="response-stack">
        ${S.p2Attempts.map(a => {
          const labels = {persona:'P',aim:'A',recipient:'R',tone:'T',structure:'S'};
          const chips = Object.entries(a.snapshot).map(([k,v]) =>
            `<span class="chip chip-${a.results[k]?'ok':'bad'}">${labels[k]}: ${v}</span>`
          ).join('');
          return `<div class="attempt-card">
            <div class="attempt-meta">Attempt ${a.attemptNum}</div>
            <div class="attempt-chips">${chips}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  return h;
}

function p2OptsHTML(cat, items, lockedCorrect, fourCol) {
  return `<div class="opts${fourCol?' four-col':''}" role="group">
    ${items.map(({v,label}) => {
      // Is this the locked-correct value?
      const isCorrect = lockedCorrect && S.p2Attempts.some(a =>
        a.results[cat] && a.snapshot[cat]?.toLowerCase() === v.toLowerCase()
      );
      const isSelected = !isCorrect && S.p2sel[cat]?.toLowerCase() === v.toLowerCase();
      const isWrong = !isCorrect && S.p2Attempts.some(a =>
        !a.results[cat] && a.snapshot[cat]?.toLowerCase() === v.toLowerCase()
        && S.p2Attempts.indexOf(a) === 0  // only last attempt
      );
      const locked = S.p2done || lockedCorrect;
      return `<button class="opt${isCorrect?' correct':isSelected?' p2-sel':isWrong?' wrong':''}"
        onclick="${locked||isCorrect?'':` setP2Option('${cat}','${v}')`}"
        ${locked||isCorrect?'style="pointer-events:none"':''}>
        <span class="opt-label">${label}</span>
      </button>`;
    }).join('')}
  </div>`;
}

// ══════════════════════════════════════════════════════════
// LOCKED VIEW
// ══════════════════════════════════════════════════════════
let LOCKED_VIEW = null;

function switchView(v) {
  if (LOCKED_VIEW) return;
  document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn');
  document.getElementById('view-'+v).classList.add('active');
  document.getElementById('tab-'+v).className = `tab-btn tab-${v==='p1'?'1':'2'}`;
  renderAll();
}

function initView() {
  const hash = window.location.hash.replace('#','').toLowerCase();
  if (!['p1','p2'].includes(hash)) return;
  LOCKED_VIEW = hash;
  document.getElementById('view-tabs').style.display = 'none';
  const other = hash === 'p1' ? 'p2' : 'p1';
  document.getElementById('view-'+other).classList.remove('active');
  document.getElementById('view-'+hash).classList.add('active');
}

// ══════════════════════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════════════════════
function renderAll() {
  if (LOCKED_VIEW === 'p1') { renderP1(); return; }
  if (LOCKED_VIEW === 'p2') { renderP2(); return; }
  renderP1(); renderP2();
}

function syncAndRender() {
  renderAll();
  syncState();
}

// ══════════════════════════════════════════════════════════
// WEBSOCKET SYNC
// ══════════════════════════════════════════════════════════
let ws = null;
let wsConnected = false;

function connectWS(forceReset = false) {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}`);

  ws.onopen = () => {
    wsConnected = true;
    updateConnectionBadge(true);
    ws.send(JSON.stringify({ type:'hello', puzzle:'p3' }));
    if (forceReset) {
      S = freshState();
      renderAll();
      syncState();
    }
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }
    if (msg.type === 'state' && (!msg.puzzle || msg.puzzle === 'p3')) {
      applyRemoteState(msg.state);
    }
    if (msg.type === 'room' && msg.room?.p3) {
      applyRemoteState(msg.room.p3);
    }
  };

  ws.onclose = () => {
    wsConnected = false;
    updateConnectionBadge(false);
    setTimeout(() => connectWS(false), 2000);
  };

  ws.onerror = () => ws.close();
}

function syncState() {
  if (ws && wsConnected) {
    ws.send(JSON.stringify({ type:'state', puzzle:'p3', state: syncableState() }));
  }
}

function updateConnectionBadge(connected) {
  const dot = document.getElementById('conn-dot');
  const lbl = document.getElementById('conn-label');
  if (!dot||!lbl) return;
  dot.style.background = connected ? '#5bf5a8' : '#f07070';
  lbl.textContent = connected ? 'CONNECTED' : 'RECONNECTING...';
}

// ══════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════
initView();
renderAll();

if (location.protocol !== 'file:') {
  connectWS(location.search.includes('reset'));
} else {
  updateConnectionBadge(true);
  document.getElementById('conn-label').textContent = 'LOCAL MODE';
}
</script>
